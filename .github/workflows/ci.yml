name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      ATLAS_ENVIRONMENT: test
      ATLAS_JWT_ISSUER: atlas-ci
      ATLAS_JWT_AUDIENCE: atlas-api
      ATLAS_JWT_SECRET: ci-secret-value-with-at-least-thirty-two-chars
      ATLAS_INTERNAL_API_SECRET: ci-internal-secret-with-at-least-thirty-two-chars
      AUTH_SECRET: ci-secret-value-with-at-least-thirty-two-chars
      AUTH_URL: http://localhost:3000
      AUTH_GITHUB_ID: ci-github-client-id
      AUTH_GITHUB_SECRET: ci-github-client-secret
      NEXT_PUBLIC_ATLAS_API_URL: http://localhost:4000
      DATABASE_URL: postgresql://atlas:atlas@localhost:5432/atlas?schema=public
      REDIS_URL: redis://localhost:6379
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: atlas
          POSTGRES_USER: atlas
          POSTGRES_PASSWORD: atlas
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U atlas -d atlas"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7.4-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - run: pnpm openapi:generate
