name: Atlas CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NODE_ENV: test
      ATLAS_ENVIRONMENT: test
      ATLAS_JWT_ISSUER: atlas-ci
      ATLAS_JWT_AUDIENCE: atlas-api
      ATLAS_JWT_SECRET: ci-secret-value-with-at-least-thirty-two-chars
      ATLAS_INTERNAL_API_SECRET: ci-internal-secret-with-at-least-thirty-two-chars
      AUTH_SECRET: ci-secret-value-with-at-least-thirty-two-chars
      AUTH_URL: http://localhost:3000
      AUTH_GITHUB_ID: ci-github-client-id
      AUTH_GITHUB_SECRET: ci-github-client-secret
      NEXT_PUBLIC_ATLAS_API_URL: http://localhost:4000
      ATLAS_API_INTERNAL_URL: http://localhost:4000
      ATLAS_WEB_ORIGINS: http://localhost:3000
      DATABASE_URL: postgresql://atlas:atlas@localhost:5432/atlas?schema=public
      REDIS_URL: redis://localhost:6379
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: atlas
          POSTGRES_USER: atlas
          POSTGRES_PASSWORD: atlas
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U atlas -d atlas"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7.4-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Enable Corepack
        run: corepack enable

      - name: Activate pnpm
        run: corepack prepare pnpm@9.15.4 --activate

      - name: Get pnpm store path
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Validate Docker Compose config
        run: docker compose config --quiet

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Apply Prisma migrations
        run: pnpm db:deploy

      - name: Check formatting
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Generate OpenAPI
        run: pnpm openapi:generate

      - name: Check OpenAPI drift
        run: git diff --exit-code -- apps/api/openapi.json

      - name: Upload OpenAPI on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: openapi-output
          path: apps/api/openapi.json
          if-no-files-found: ignore
